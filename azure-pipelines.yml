trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: "22.x"
  containerRegistryServiceConnection: "agentops-acr-service-connection"
  kubernetesServiceConnection: "agentops-aks-service-connection"
  containerRegistry: "agentops.azurecr.io"
  frontendApiBaseUrl: ""

stages:
  - stage: verify
    displayName: Verify
    jobs:
      - job: node
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: Use Node.js

          - script: npm ci
            displayName: Install dependencies

          - script: npm run typecheck
            displayName: Typecheck

          - script: npm test
            displayName: Tests

          - script: npm run build
            displayName: Build

  - stage: containerize
    displayName: Containerize
    dependsOn: verify
    condition: succeeded()
    jobs:
      - job: docker
        steps:
          - task: Docker@2
            displayName: Build backend image
            inputs:
              command: build
              containerRegistry: $(containerRegistryServiceConnection)
              repository: agentops/backend
              Dockerfile: backend/Dockerfile
              buildContext: .
              tags: |
                $(Build.BuildId)

          - task: Docker@2
            displayName: Push backend image
            inputs:
              command: push
              containerRegistry: $(containerRegistryServiceConnection)
              repository: agentops/backend
              tags: |
                $(Build.BuildId)

          - task: Docker@2
            displayName: Build frontend image
            inputs:
              command: build
              containerRegistry: $(containerRegistryServiceConnection)
              repository: agentops/frontend
              Dockerfile: frontend/Dockerfile
              buildContext: .
              arguments: --build-arg VITE_API_BASE_URL=$(frontendApiBaseUrl)
              tags: |
                $(Build.BuildId)

          - task: Docker@2
            displayName: Push frontend image
            inputs:
              command: push
              containerRegistry: $(containerRegistryServiceConnection)
              repository: agentops/frontend
              tags: |
                $(Build.BuildId)

  - stage: deploy_aks
    displayName: Deploy to AKS
    dependsOn: containerize
    condition: succeeded()
    jobs:
      - deployment: aks
        environment: agentops-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: KubernetesManifest@0
                  displayName: Deploy Kubernetes manifests
                  inputs:
                    action: deploy
                    kubernetesServiceConnection: $(kubernetesServiceConnection)
                    namespace: agentops
                    manifests: |
                      infra/k8s/namespace.yaml
                      infra/k8s/configmap.yaml
                      infra/k8s/qdrant-deployment.yaml
                      infra/k8s/qdrant-service.yaml
                      infra/k8s/backend-deployment.yaml
                      infra/k8s/backend-service.yaml
                      infra/k8s/frontend-deployment.yaml
                      infra/k8s/frontend-service.yaml
                    containers: |
                      $(containerRegistry)/agentops/backend:$(Build.BuildId)
                      $(containerRegistry)/agentops/frontend:$(Build.BuildId)
