services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting production compose}
      POSTGRES_DB: agentops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d agentops"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agentops

  qdrant:
    image: qdrant/qdrant:v1.15.3
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agentops

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: agentops/backend:${IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3333
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      API_KEYS: ${API_KEYS:?Set API_KEYS with role:key values before starting production compose}
      DATA_STORE: postgres
      POSTGRES_URL: postgres://agentops:${POSTGRES_PASSWORD}@postgres:5432/agentops
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-agentops_documents}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-azure-gpt-4o-mini}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_MODEL: ${GOOGLE_GENERATIVE_AI_MODEL:-gemini-2.5-flash}
      MASTRA_MODEL: ${MASTRA_MODEL:-google/gemini-2.5-flash}
      OUTBOX_PUBLISHER: ${OUTBOX_PUBLISHER:-local}
      AZURE_SERVICE_BUS_CONNECTION_STRING: ${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      AZURE_SERVICE_BUS_TOPIC: ${AZURE_SERVICE_BUS_TOPIC:-agentops-events}
      DOCUMENT_STORAGE: ${DOCUMENT_STORAGE:-local}
      DOCUMENT_STORAGE_DIR: /app/data/uploads
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-agentops-documents}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-1000000}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-agentops-backend}
    volumes:
      - document-data:/app/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      agentops:
        aliases:
          - agentops-backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: agentops/frontend:${IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentops

  mastra-studio:
    build:
      context: .
      dockerfile: backend/Dockerfile.studio
    image: agentops/mastra-studio:${IMAGE_TAG:-local}
    restart: unless-stopped
    profiles:
      - studio
    environment:
      NODE_ENV: production
      MASTRA_MODEL: ${MASTRA_MODEL:-google/gemini-2.5-flash}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
    ports:
      - "${MASTRA_STUDIO_PORT:-3001}:3001"
      - "${MASTRA_SERVER_PORT:-4111}:4111"
    networks:
      - agentops

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    profiles:
      - llm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    networks:
      - agentops

networks:
  agentops:

volumes:
  postgres-data:
  qdrant-data:
  document-data:
