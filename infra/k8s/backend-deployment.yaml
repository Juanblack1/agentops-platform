apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-backend
  namespace: agentops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentops-backend
  template:
    metadata:
      labels:
        app: agentops-backend
    spec:
      containers:
        - name: backend
          image: agentops.azurecr.io/agentops/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3333
              name: http
          envFrom:
            - configMapRef:
                name: agentops-config
            - secretRef:
                name: agentops-secrets
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
