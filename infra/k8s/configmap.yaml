apiVersion: v1
kind: ConfigMap
metadata:
  name: agentops-config
  namespace: agentops
data:
  NODE_ENV: production
  PORT: "3333"
  ENABLE_API_DOCS: "false"
  CORS_ORIGINS: ""
  LOG_LEVEL: info
  DATA_STORE: postgres
  DOCUMENT_STORAGE: azure-blob
  AZURE_STORAGE_CONTAINER: agentops-documents
  OUTBOX_PUBLISHER: servicebus
  AZURE_SERVICE_BUS_TOPIC: agentops-events
  LLM_PROVIDER: litellm
  LITELLM_BASE_URL: http://litellm:4000
  LITELLM_MODEL: azure-gpt-4o-mini
  VECTOR_STORE: qdrant
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: agentops_documents
  UPLOAD_MAX_BYTES: "1000000"
  OTEL_SERVICE_NAME: agentops-backend
