apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-frontend
  namespace: agentops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentops-frontend
  template:
    metadata:
      labels:
        app: agentops-frontend
    spec:
      containers:
        - name: frontend
          image: agentops.azurecr.io/agentops/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
