apiVersion: v1
kind: Secret
metadata:
  name: agentops-secrets
  namespace: agentops
type: Opaque
stringData:
  POSTGRES_URL: postgres://agentopsadmin:<password>@<postgres-host>:5432/agentops?sslmode=require
  AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=<storage>;AccountKey=<key>;EndpointSuffix=core.windows.net
  AZURE_SERVICE_BUS_CONNECTION_STRING: Endpoint=sb://<namespace>.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=<key>
  LITELLM_API_KEY: <litellm-key>
  API_KEYS: operator:<operator-key>,reviewer:<reviewer-key>,admin:<admin-key>
